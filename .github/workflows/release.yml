name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p lazyfetch

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p lazyfetch

      - name: Package
        id: pkg
        shell: bash
        run: |
          NAME="lazyfetch-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/lazyfetch dist/
          cp README.md LICENSE 2>/dev/null || true
          tar -C dist -czf "${NAME}.tar.gz" lazyfetch $(ls dist 2>/dev/null | grep -E '^(README|LICENSE)' || true)
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          echo "asset=${NAME}.tar.gz" >> $GITHUB_OUTPUT
          echo "checksum=${NAME}.tar.gz.sha256" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.checksum }}
          generate_release_notes: true

  publish:
    name: cargo publish
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          for c in core http storage auth import tui; do
            cargo publish -p lazyfetch-$c
            sleep 15  # wait for index propagation before next crate sees it
          done
          cargo publish -p lazyfetch
