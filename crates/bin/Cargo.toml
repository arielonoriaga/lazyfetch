[package]
name = "lazyfetch"
description = "Terminal-first HTTP client. Postman alternative for the keyboard."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "../../README.md"
keywords.workspace = true
categories.workspace = true

[dependencies]
lazyfetch-core    = { workspace = true }
lazyfetch-http    = { workspace = true }
lazyfetch-storage = { workspace = true }
lazyfetch-auth    = { workspace = true }
lazyfetch-tui     = { workspace = true }
lazyfetch-import  = { workspace = true }
clap              = { version = "4", features = ["derive"] }
tokio             = { workspace = true }
anyhow            = { workspace = true }
tracing           = { workspace = true }
tracing-subscriber = { workspace = true }
dirs              = "5"
secrecy           = { workspace = true }
serde_json        = { workspace = true }
ulid              = { workspace = true }

[dev-dependencies]
http       = { workspace = true }
tempfile   = "3"
wiremock   = "0.6"
tokio      = { workspace = true, features = ["macros","rt"] }

[[bin]]
name = "lazyfetch"
path = "src/main.rs"
